# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.3.1"

package:
  name: rloop
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/rloop/rloop-${{ version }}.tar.gz
  sha256: 4232b9ba782508ac010c35210c748db02a55bdd1a4e0b718a692edd47b362a21

build:
  number: 0
  skip: win
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
      CARGO: cargo-auditable-wrapper${{ ".bat" if win }}
    content:
      - cp "${RECIPE_DIR}/cargo-auditable-wrapper.sh" "${BUILD_PREFIX}/bin/cargo-auditable-wrapper"
      - chmod 755 "${BUILD_PREFIX}/bin/cargo-auditable-wrapper"
      - |-
        ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
      - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

requirements:
  build:
    - ${{ compiler("rust") }}
    - ${{ stdlib("c") }}
    - cargo-bundle-licenses
    - cargo-auditable
  host:
    - maturin >=1.8.0,<2.0.0
    - pip
    - python
  run:
    - python

tests:
  - python:
      imports: rloop
      pip_check: true
  # hangs on pytest
  # https://github.com/conda-forge/rloop-feedstock/pull/5
  - if: target_platform != "linux-ppc64le"
    then:
      - files:
          source:
            - pyproject.toml
            - tests/
        requirements:
          run:
            - coverage
            - pytest >=7.4.2,<7.5.0
            - pytest-asyncio >=0.21.1,<0.22.0
        script:
          file: run_test.py

about:
  summary: An asyncio event loop implemented in Rust
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/gi0baro/rloop

extra:
  recipe-maintainers:
    - bollwyvl
