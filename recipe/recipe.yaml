# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "0.2.0"

package:
  name: rloop
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/r/rloop/rloop-${{ version }}.tar.gz
  sha256: a295c6dd57ff0e2bdeaf3ba7ce47fcbefd40668657cdd4ed64055dc72da3a140

build:
  number: 3
  skip: win
  script:
    env:
      CARGO_PROFILE_RELEASE_STRIP: symbols
      CARGO_PROFILE_RELEASE_LTO: fat
      CARGO: cargo-auditable-wrapper${{ ".bat" if win }}
    content:
      - cp "${RECIPE_DIR}/cargo-auditable-wrapper.sh" "${BUILD_PREFIX}/bin/cargo-auditable-wrapper"
      - chmod 755 "${BUILD_PREFIX}/bin/cargo-auditable-wrapper"
      - |-
        ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check
      - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

requirements:
  build:
    - ${{ compiler("rust") }}
    - ${{ stdlib("c") }}
    - cargo-bundle-licenses
    - cargo-auditable
  host:
    - maturin >=1.1.0,<2.0.0
    - pip
    - python
  run:
    - python

tests:
  - python:
      imports: rloop
      pip_check: true
    # hangs on pytest
    # https://github.com/conda-forge/rloop-feedstock/pull/5
  - files:
      source:
        - pyproject.toml
        - tests/
    requirements:
      run:
        - coverage
        - pytest >=7.4.2,<7.5.0
        - pytest-asyncio >=0.21.1,<0.22.0
    script:
      file: run_test.py

about:
  summary: An asyncio event loop implemented in Rust
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/gi0baro/rloop

extra:
  recipe-maintainers:
    - bollwyvl
